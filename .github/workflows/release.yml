name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
            rust_target: 'aarch64-apple-darwin, x86_64-apple-darwin'
          - platform: 'windows-latest'
            args: ''
            rust_target: 'x86_64-pc-windows-msvc'
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install dependencies
        run: npm install

      - name: Build the app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
        run: npm run tauri build -- ${{ matrix.args }}

      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.platform }}
          path: |
            src-tauri/target/**/release/bundle/dmg/*.dmg
            src-tauri/target/**/release/bundle/dmg/*.sig
            src-tauri/target/**/release/bundle/macos/*.app.tar.gz
            src-tauri/target/**/release/bundle/macos/*.app.tar.gz.sig
            src-tauri/target/**/release/bundle/nsis/*.exe
            src-tauri/target/**/release/bundle/nsis/*.sig
            src-tauri/target/**/release/bundle/msi/*.msi
            src-tauri/target/**/release/bundle/msi/*.sig
          if-no-files-found: warn

  publish-release:
    needs: build-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          pattern: "release-assets-*"
          merge-multiple: true

      - name: Build latest.json from signatures
        env:
          VERSION: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          DOWNLOAD_BASE="https://github.com/${REPO}/releases/download/${VERSION}"
          VER="${VERSION#v}"

          # Helper: read signature content from .sig file in artifacts
          read_sig() {
            local pattern="$1"
            local sig_file
            sig_file=$(find all-artifacts -name "$pattern" -type f 2>/dev/null | head -1)
            if [ -n "$sig_file" ] && [ -f "$sig_file" ]; then
              cat "$sig_file"
            else
              echo ""
            fi
          }

          # Read signatures
          MACOS_UNIVERSAL_SIG=$(read_sig "*.app.tar.gz.sig")
          WINDOWS_NSIS_SIG=$(read_sig "*_x64-setup.exe.sig")

          # Get filenames for URL
          MAC_FILE=$(find all-artifacts -name "*.app.tar.gz" -type f -exec basename {} \; | head -1)
          WIN_FILE=$(find all-artifacts -name "*_x64-setup.exe" -type f -exec basename {} \; | head -1)

          jq -n \
            --arg version "$VER" \
            --arg notes "请在下方 Assets 区域下载安装包。\n如果您已安装旧版，可在软件内点击检查更新自动安装。" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg dl "$DOWNLOAD_BASE" \
            --arg mac_sig "$MACOS_UNIVERSAL_SIG" \
            --arg win_sig "$WINDOWS_NSIS_SIG" \
            --arg mac_file "$MAC_FILE" \
            --arg win_file "$WIN_FILE" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-universal": {
                  url: "\($dl)/\($mac_file)",
                  signature: $mac_sig
                },
                "darwin-aarch64": {
                  url: "\($dl)/\($mac_file)",
                  signature: $mac_sig
                },
                "darwin-x86_64": {
                  url: "\($dl)/\($mac_file)",
                  signature: $mac_sig
                },
                "windows-x86_64": {
                  url: "\($dl)/\($win_file)",
                  signature: $win_sig
                }
              }
            }' > latest.json

          echo "Generated latest.json:"
          cat latest.json

      - name: Create or Update GitHub Release
        uses: ncipollo/release-action@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          allowUpdates: true
          name: "sanOmni ${{ github.ref_name }}"
          body: "请在下方 Assets 区域下载安装包。\n如果您已安装旧版，可在软件内点击检查更新自动安装。"
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "all-artifacts/**/*,latest.json"
          artifactErrorsFailBuild: false
          replacesArtifacts: true
